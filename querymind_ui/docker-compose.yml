services:
  querymind-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - querymind-gateway
    networks:
      - querymind-network
    restart: unless-stopped

networks:
  querymind-network:
    driver: bridge
